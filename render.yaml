services:
  - type: web
    name: perknation-backend
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PROJECT_NAME
        value: PerkNation Backend
      - key: API_V1_PREFIX
        value: /v1
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_NAME
        value: postgres
      - key: DATABASE_USER
        value: postgres
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_SSLMODE
        value: require
      - key: DATABASE_FORCE_IPV4
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: SEED_DEFAULT_DATA
        value: "false"
      - key: DEV_EXPOSE_EMAIL_VERIFICATION_CODE
        value: "false"
      - key: FORMS_BACKUP_ENABLED
        value: "false"
      - key: AI_ENABLED
        value: "true"
      - key: AI_PROVIDER
        value: spark
      - key: SPARK_PUBLIC_BASE_URL
        value: http://47.51.26.74
      - key: SPARK_CHAT_HOST_ID
        value: mini
      - key: OLLAMA_MODEL
        value: qwen3:30b
      - key: WALLET_PASS_SERVICE_URL
        sync: false
      - key: WALLET_PASS_TYPE_IDENTIFIER
        sync: false
      - key: WALLET_TEAM_IDENTIFIER
        sync: false
      - key: WALLET_ORGANIZATION_NAME
        value: PerkNation
      - key: WALLET_SIGNER_CERTIFICATE_PATH
        sync: false
      - key: WALLET_SIGNER_KEY_PATH
        sync: false
      - key: WALLET_WWDR_CERTIFICATE_PATH
        sync: false
      - key: WALLET_SIGNER_CERTIFICATE_PEM
        sync: false
      - key: WALLET_SIGNER_KEY_PEM
        sync: false
      - key: WALLET_WWDR_CERTIFICATE_PEM
        sync: false
      - key: WALLET_HQ_PASS_TYPE_IDENTIFIER
        value: pass.com.neonflux.thq
      - key: WALLET_HQ_TEAM_IDENTIFIER
        value: PL9PGQKXUW
      - key: WALLET_HQ_ORGANIZATION_NAME
        value: NEONFLUX LLC
      - key: WALLET_HQ_DESCRIPTION
        value: The HQ
      - key: WALLET_HQ_SIGNER_CERTIFICATE_PATH
        sync: false
      - key: WALLET_HQ_SIGNER_KEY_PATH
        sync: false
      - key: WALLET_HQ_WWDR_CERTIFICATE_PATH
        sync: false
      - key: WALLET_HQ_SIGNER_CERTIFICATE_PEM
        sync: false
      - key: WALLET_HQ_SIGNER_KEY_PEM
        sync: false
      - key: WALLET_HQ_WWDR_CERTIFICATE_PEM
        sync: false
