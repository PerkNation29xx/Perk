services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: perknation
      POSTGRES_USER: perknation
      POSTGRES_PASSWORD: perknation
    ports:
      - "5432:5432"
    volumes:
      - perknation_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perknation -d perknation"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://perknation:perknation@db:5432/perknation
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  perknation_pgdata:
