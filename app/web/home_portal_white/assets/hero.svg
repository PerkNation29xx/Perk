  <!-- phone mock -->
  <g transform="translate(690,380)">
    <rect x="-120" y="-170" width="210" height="300" rx="34" fill="#0d0d0d" opacity=".8" stroke="#faf7f7" stroke-opacity=".20"/>
    <rect x="-100" y="-140" width="170" height="240" rx="22" fill="#111" stroke="#faf7f7" stroke-opacity=".10"/>
    <rect x="-86" y="-122" width="142" height="40" rx="20" fill="#e6b84a" opacity=".92"/>
    <rect x="-86" y="-70" width="142" height="18" rx="9" fill="#faf7f7" opacity=".10"/>
    <rect x="-86" y="-44" width="112" height="18" rx="9" fill="#faf7f7" opacity=".08"/>
