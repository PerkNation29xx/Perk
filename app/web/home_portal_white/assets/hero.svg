<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 640" role="img" aria-label="Dining illustration">
  <defs>
    <radialGradient id="rg" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#e6b84a" stop-opacity=".35"/>
      <stop offset="1" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg2" cx="70%" cy="10%" r="80%">
      <stop offset="0" stop-color="#C33F16" stop-opacity=".22"/>
      <stop offset="1" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="940" height="640" rx="42" fill="#111"/>
  <rect width="940" height="640" rx="42" fill="url(#rg)"/>
  <rect width="940" height="640" rx="42" fill="url(#rg2)"/>

  <!-- abstract table -->
