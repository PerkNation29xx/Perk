<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Perk Nation crystal collectible and designer jewelry product page." />
  <meta name="theme-color" content="#f8fafc" />
  <title>Jewelry Product - Perk Nation</title>
  <link rel="canonical" href="/white/jewelry" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/white/assets/styles.css" />
</head>
<body data-assets-base="/white/assets" data-jewelry-home="/white/#crystal-jewelry" data-contact-path="/white/contact-us">
  <header class="header">
    <div class="container">
      <div class="nav">
        <a class="brand" href="/white/" aria-label="Perk Nation home">
          <span class="brandMark" aria-hidden="true">
            <img src="/white/assets/mark.svg" alt="" width="24" height="24" />
          </span>
          <span>Perk Nation</span>
        </a>

        <nav class="navlinks" aria-label="Primary navigation">
          <a href="/white/members">Members</a>
          <a href="/white/merchants">Merchants</a>
          <a href="/white/how-it-works">How it Works</a>
          <a href="/white/contact-us">Contact Us</a>
          <a href="/white/faq">FAQ</a>
        </nav>

        <div class="navcta">
          <button class="btn menuBtn" data-menu-btn aria-label="Open menu">Menu</button>
          <a class="btn ghost" href="/white/login">Login</a>
        </div>
      </div>

      <div class="mobileMenu" data-mobile-menu>
        <a href="/white/members">Members</a>
        <a href="/white/merchants">Merchants</a>
        <a href="/white/how-it-works">How it Works</a>
        <a href="/white/contact-us">Contact Us</a>
        <a href="/white/faq">FAQ</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section jewelryProductHero">
      <div class="container">
        <a class="jewelryBackLink" data-jewelry-back href="/white/#crystal-jewelry">Back to jewelry</a>
        <div class="jewelryAlert" data-jewelry-alert hidden></div>

        <div class="jewelryDetailGrid" data-jewelry-detail>
          <div class="jewelryDetailMedia" data-jewelry-media></div>

          <div class="jewelryDetailPanel">
            <div class="badge" data-jewelry-category>Jewelry</div>
            <h1 data-jewelry-title>Loading product</h1>
            <p class="p" data-jewelry-description></p>

            <div class="jewelryDetailPrice">
              <div class="priceRow">
                <span class="retailPrice" data-jewelry-retail></span>
                <span class="discountBadge" data-jewelry-discount></span>
              </div>
              <div class="dealPrice" data-jewelry-price></div>
            </div>

            <ul class="jewelryBullets" data-jewelry-bullets></ul>

            <div class="jewelryDetailActions">
              <button class="btn primary" type="button" data-jewelry-checkout>Buy now</button>
              <a class="btn" data-jewelry-contact href="https://www.instagram.com/perk.nation.rewards" target="_blank" rel="noopener">Message on Instagram</a>
            </div>
            <p class="small muted" data-jewelry-note></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap">
        <div style="display:flex; align-items:center; gap:12px">
          <img src="/white/assets/mark.svg" alt="Perk Nation" width="34" height="34" />
          <div>
            <div style="font-weight:900">Perk Nation</div>
            <div class="small">Universal, AI-driven commerce & rewards ecosystem</div>
          </div>
        </div>
        <div class="small">2026 Perk Nation</div>
      </div>
    </div>
  </footer>

  <script src="/white/assets/app.js"></script>
  <script src="/white/assets/jewelry-products.js"></script>
</body>
</html>
